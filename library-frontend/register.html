<!doctype html>
<html ng-app="LibraryApp">
<head>
    <meta charset="utf-8">
    <title>註冊｜iRead Library</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body ng-controller="RegisterController">

    <h1>iRead Library 圖書館系統</h1>
    <h2>讀者註冊</h2>

    <form ng-submit="register()">
        <table>
            <tr>
                <td>帳號</td>
                <td>
                    <input type="text" ng-model="form.username" required>
                </td>
            </tr>

            <tr>
                <td>密碼</td>
                <td>
                    <input type="password" ng-model="form.password" required>
                </td>
            </tr>

            <tr>
                <td>確認密碼</td>
                <td>
                    <input type="password" ng-model="confirmPassword" required>
                </td>
            </tr>

            <tr>
                <td>姓名</td>
                <td>
                    <input type="text" ng-model="form.name" required>
                </td>
            </tr>

            <tr>
                <td>Email</td>
                <td>
                    <input type="email" ng-model="form.email" required>
                </td>
            </tr>

            <tr>
                <td>電話</td>
                <td>
                    <input type="text" ng-model="form.phone">
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <button type="submit">註冊</button>
                    <button type="button" ng-click="goLogin()">回登入頁</button>
                    <button type="button" ng-click="goBooks()">先看館藏</button>
                </td>
            </tr>
        </table>
    </form>

    <p style="color:red;" ng-if="errorMessage">
        {{ errorMessage }}
    </p>

</body>
</html>
